---
name: "CI"
"on":
  push:
    branches:
    - "main"
    - "master"
  pull_request:
    branches:
    - "main"
    - "master"
  workflow_dispatch: null
jobs:
  backend-ci:
    name: "Backend CI (Style, Unit Tests, IT)"
    runs-on: "ubuntu-latest"
    steps:
    - name: "Checkout code"
      uses: "actions/checkout@v4"
    - name: "Set up JDK 17"
      uses: "actions/setup-java@v4"
      with:
        java-version: "17"
        distribution: "temurin"
        cache: "maven"
    - name: "Format and Style Check"
      run: "mvn spotless:check checkstyle:check"
    - name: "Run All Unit Tests"
      run: "mvn test"
    - name: "Build and Run Integration Tests"
      run: "mvn verify -pl integration-test -am"
  frontend-test:
    name: "Frontend Tests"
    runs-on: "ubuntu-latest"
    steps:
    - name: "Checkout code"
      uses: "actions/checkout@v4"
    - name: "Set up Node.js"
      uses: "actions/setup-node@v4"
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: "coding-agent/ganglia-coding-webui/package-lock.json"
    - name: "Install dependencies"
      working-directory: "coding-agent/ganglia-coding-webui"
      run: "npm ci"
    - name: "Run Tests"
      working-directory: "coding-agent/ganglia-coding-webui"
      run: "npm run test -- --run"
